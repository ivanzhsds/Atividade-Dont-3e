<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Soma até zero</title>
</head>
<body>

<input id="numero" placeholder="Digite um número:">
<button onclick="soma()">Somar</button>

<p id="resultado">Soma: 0</p>

<script>

let total = 0;

function soma(){
    let numero = Number(document.getElementById("numero").value);
    let resultado = document.getElementById("resultado");

    if(numero === 0){
        resultado.innerHTML = "Programa encerrado. Soma final: " + total;
        return;
    }

    total += numero;

    resultado.innerHTML = "Soma: " + total;

    document.getElementById("numero").value = "";
}

</script>

</body>
</html>
