<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id= "bnt">calcular</button>
    <p id="resultado">resultado</p>
    <input id="n1">
    <input id="n2">

    <select  id="operacao">
     <option value="+">+</option>
      <option value="-">-</option>
       <option value="*">*</option>
         <option value="/">/</option>
    </select>

     <script>

      let butao = document.getElementById("bnt");
       let resultado =document.getElementById("resultado");
        let numero1 = document.getElementById("n1");
         let numero2 = document.getElementById("n2");
          let operacao = document.getElementById("operacao");
         
             butao.addEventListener("click", function(){
               let n1 = Number(numero1.value);
              let n2 = Number(numero2.value);
             let op = operacao.value;
            let res;
             if (op === "+") {
                 res = n1 + n2;
                  } else if (op === "-") {
                       res = n1 - n2;
                   } else if (op === "*") {
                 res = n1 * n2;
                   } else if (op === "/") {
                         res = n1 / n2;
                            }
                 resultado.innerText = res;
                  })
     </script>
</body>
</html>
